<!DOCTYPE html>
<html>
<head>
  <title>Email Audit Tracker - 4 Parameters</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
    textarea { width: 100%; height: 120px; padding: 10px; border-radius: 6px; border: 1px solid #ccc; }
    .email-box { background: #fff; border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .summary { font-weight: bold; cursor: pointer; color: #0078d7; }
    .date { font-size: 12px; color: gray; margin-top: 5px; }
    .btn { background-color: #0078d7; color: white; border: none; padding: 10px 16px; margin: 5px 5px 5px 0; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .btn:hover { background-color: #005a9e; }
    .btn-danger { background-color: #d9534f; }
    .btn-danger:hover { background-color: #b52b27; }
    select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; margin-top: 5px; }
  </style>
</head>
<body>
  <h1>Email Audit Tracker</h1>
  
  <!-- Audit entry form -->
  <textarea id="emailInput" placeholder="Paste or type your audited email here..."></textarea><br>
  
  <!-- Parameter dropdowns -->
  <div class="email-box">
    <label><strong>Reliable</strong></label>
    <select id="paramReliable">
      <option value="">-- Select --</option>
      <option>Did not understand the intent</option>
      <option>Did not use the tool properly</option>
      <option>Incorrect information/solution provided</option>
      <option>Incorrect ticket creation</option>
      <option>Incorrect workgroup/staging</option>
      <option>Unnecessary endorsement</option>
      <option>No OP</option>
      <option>Coaching op</option>
    </select>
  </div>

  <div class="email-box">
    <label><strong>Personable</strong></label>
    <select id="paramPersonable">
      <option value="">-- Select --</option>
      <option>Customer validation and empathy gap</option>
      <option>Did not adjust the tone/pace to match the customer</option>
      <option>Did not adjust to the customer language</option>
      <option>Negative words, phrasing and limitations</option>
      <option>Unfriendly/discourteous/sarcastic</option>
      <option>Sounded transactional or robotic</option>
      <option>No OP</option>
      <option>Coaching op</option>
    </select>
  </div>

  <div class="email-box">
    <label><strong>Fast</strong></label>
    <select id="paramFast">
      <option value="">-- Select --</option>
      <option>Delayed ticket creation/staging</option>
      <option>No ticket created</option>
      <option>No OP</option>
      <option>Coaching op</option>
    </select>
  </div>

  <div class="email-box">
    <label><strong>Safe and Secure</strong></label>
    <select id="paramSafe">
      <option value="">-- Select --</option>
      <option>Sounded Confident</option>
      <option>Vague Explanation</option>
      <option>Did not involve the customer in an engaging experience</option>
      <option>No OP</option>
      <option>Coaching op</option>
    </select>
  </div>

  <!-- Single Save Button -->
  <button class="btn" onclick="saveEmail()">Save Audit</button>
  
  <h2>Search Audits</h2>
  <input type="text" id="searchInput" placeholder="Enter keyword..." style="padding:8px; border-radius:6px; border:1px solid #ccc;">
  <button class="btn" onclick="searchEmails()">Search</button>
  <button class="btn" onclick="renderEmails(emails)">Show All</button>
  <button class="btn" onclick="exportCSV()">Export Excel (CSV)</button>
  
  <h2>Saved Audits</h2>
  <div id="emailList"></div>
  <h3>Total Audits: <span id="auditCount">0</span></h3>

  <script>
    let emails = JSON.parse(localStorage.getItem('emails') || '[]');

    function saveEmail() {
      const text = document.getElementById('emailInput').value.trim();
      const reliable = document.getElementById('paramReliable').value;
      const personable = document.getElementById('paramPersonable').value;
      const fast = document.getElementById('paramFast').value;
      const safe = document.getElementById('paramSafe').value;

      if (text) {
        const now = new Date();
        const entry = { 
          id: Date.now(),
          text: text,
          reliable: reliable || "Not selected",
          personable: personable || "Not selected",
          fast: fast || "Not selected",
          safe: safe || "Not selected",
          date: now.toLocaleString() 
        };
        emails.push(entry);
        localStorage.setItem('emails', JSON.stringify(emails));
        document.getElementById('emailInput').value = '';
        document.getElementById('paramReliable').value = '';
        document.getElementById('paramPersonable').value = '';
        document.getElementById('paramFast').value = '';
        document.getElementById('paramSafe').value = '';
        renderEmails(emails);
      }
    }

    function renderEmails(listToShow) {
      const list = document.getElementById('emailList');
      list.innerHTML = '';
      listToShow.forEach((entry) => {
        const summary = entry.text.length > 50 ? entry.text.substring(0, 50) + "..." : entry.text;
        list.innerHTML += `
          <div class="email-box">
            <div class="summary" onclick="toggleEmail(${entry.id})">${summary}</div>
            <div class="date">Saved on: ${entry.date}</div>
            <div><strong>Reliable:</strong> ${entry.reliable}</div>
            <div><strong>Personable:</strong> ${entry.personable}</div>
            <div><strong>Fast:</strong> ${entry.fast}</div>
            <div><strong>Safe & Secure:</strong> ${entry.safe}</div>
            <textarea id="email${entry.id}" style="display:none;" onchange="editEmail(${entry.id}, this.value)">${entry.text}</textarea>
            <button class="btn btn-danger" onclick="deleteEmail(${entry.id})">Delete</button>
          </div>
        `;
      });
      document.getElementById('auditCount').innerText = emails.length;
    }

    function toggleEmail(id) {
      const box = document.getElementById('email' + id);
      if (box) box.style.display = box.style.display === 'none' ? 'block' : 'none';
    }

    function editEmail(id, newText) {
      const entry = emails.find(e => e.id === id);
      if (entry) {
        entry.text = newText;
        localStorage.setItem('emails', JSON.stringify(emails));
        renderEmails(emails);
      }
    }

    function deleteEmail(id) {
      emails = emails.filter(e => e.id !== id);
      localStorage.setItem('emails', JSON.stringify(emails));
      renderEmails(emails);
    }

    function searchEmails() {
      const keyword = document.getElementById('searchInput').value.toLowerCase();
      const filtered = emails.filter(entry => 
        entry.text.toLowerCase().includes(keyword) ||
        entry.reliable.toLowerCase().includes(keyword) ||
        entry.personable.toLowerCase().includes(keyword) ||
        entry.fast.toLowerCase().includes(keyword) ||
        entry.safe.toLowerCase().includes(keyword)
      );
      renderEmails(filtered);
    }

        function exportCSV() {
      // Define CSV header
      let csvContent = "Audit Number,Date,Reliable,Personable,Fast,Safe,Text\n";
      
      emails.forEach((entry, i) => {
        // Escape quotes in the email text
        const safeText = '"' + entry.text.replace(/"/g, '""') + '"';
        
        // Build each row with parameters and text
        csvContent += `${i+1},"${entry.date}","${entry.reliable}","${entry.personable}","${entry.fast}","${entry.safe}",${safeText}\n`;
      });

      // Create and download the CSV file
      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      link.setAttribute("href", url);
      link.setAttribute("download", "audits_export.csv");
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    // Initial render when page loads
    renderEmails(emails);
  </script>
</body>
</html>
