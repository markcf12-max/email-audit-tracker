<!DOCTYPE html>
<html>
<head>
  <title>Email Audit Tracker - 4 Forms</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; }
    .audit-form { background: #fff; border: 1px solid #ddd; padding: 15px; margin: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); width: 45%; display: inline-block; vertical-align: top; }
    textarea { width: 100%; height: 100px; padding: 10px; border-radius: 6px; border: 1px solid #ccc; }
    select { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc; margin-top: 5px; }
    .btn { background-color: #0078d7; color: white; border: none; padding: 8px 12px; margin-top: 8px; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .btn:hover { background-color: #005a9e; }
    .btn-danger { background-color: #d9534f; }
    .btn-danger:hover { background-color: #b52b27; }
    .email-box { background: #fff; border: 1px solid #ddd; padding: 15px; margin: 10px 0; border-radius: 8px; }
    .summary { font-weight: bold; cursor: pointer; color: #0078d7; }
    .date { font-size: 12px; color: gray; margin-top: 5px; }
  </style>
</head>
<body>
  <h1>Email Audit Tracker (4 Forms)</h1>

  <!-- Four audit forms -->
  <div class="audit-form">
    <h3>Audit Form 1</h3>
    <textarea id="emailInput1" placeholder="Paste audited email..."></textarea>
    <select id="parameterSelect1">
      <option value="">-- Choose Parameter --</option>
      <optgroup label="Reliable">
        <option>Did not understand the intent</option>
        <option>Did not use the tool properly</option>
        <option>Incorrect information/solution provided</option>
        <option>Incorrect ticket creation</option>
        <option>Incorrect workgroup/staging</option>
        <option>Unnecessary endorsement</option>
        <option>No OP</option>
        <option>Coaching op</option>
      </optgroup>
      <optgroup label="Personable">
        <option>Customer validation and empathy gap</option>
        <option>Did not adjust the tone/pace to match the customer</option>
        <option>Did not adjust to the customer language</option>
        <option>Negative words, phrasing and limitations</option>
        <option>Unfriendly/discourteous/sarcastic</option>
        <option>Sounded transactional or robotic</option>
        <option>Coaching op</option>
      </optgroup>
      <optgroup label="Fast">
        <option>Delayed ticket creation/staging</option>
        <option>No ticket created</option>
        <option>No OP</option>
        <option>Coaching op</option>
      </optgroup>
      <optgroup label="Safe and Secure">
        <option>Sounded Confident</option>
        <option>Vague Explanation</option>
        <option>Did not involve the customer in an engaging experience</option>
        <option>No OP</option>
        <option>Coaching op</option>
      </optgroup>
    </select>
    <button class="btn" onclick="saveEmail(1)">Save Audit</button>
  </div>

  <div class="audit-form">
    <h3>Audit Form 2</h3>
    <textarea id="emailInput2" placeholder="Paste audited email..."></textarea>
    <select id="parameterSelect2"></select>
    <button class="btn" onclick="saveEmail(2)">Save Audit</button>
  </div>

  <div class="audit-form">
    <h3>Audit Form 3</h3>
    <textarea id="emailInput3" placeholder="Paste audited email..."></textarea>
    <select id="parameterSelect3"></select>
    <button class="btn" onclick="saveEmail(3)">Save Audit</button>
  </div>

  <div class="audit-form">
    <h3>Audit Form 4</h3>
    <textarea id="emailInput4" placeholder="Paste audited email..."></textarea>
    <select id="parameterSelect4"></select>
    <button class="btn" onclick="saveEmail(4)">Save Audit</button>
  </div>

  <h2>Saved Audits</h2>
  <div id="emailList"></div>
  <h3>Total Audits: <span id="auditCount">0</span></h3>

  <script>
    let emails = JSON.parse(localStorage.getItem('emails') || '[]');

    // Clone parameter options into all dropdowns
    function cloneOptions() {
      const base = document.getElementById('parameterSelect1').innerHTML;
      for (let i = 2; i <= 4; i++) {
        document.getElementById('parameterSelect' + i).innerHTML = base;
      }
    }
    cloneOptions();

    function saveEmail(formNumber) {
      const text = document.getElementById('emailInput' + formNumber).value.trim();
      const parameter = document.getElementById('parameterSelect' + formNumber).value;
      if (text) {
        const now = new Date();
        const entry = {
          id: Date.now() + formNumber,
          text: text,
          parameter: parameter || "Not selected",
          date: now.toLocaleString()
        };
        emails.push(entry);
        localStorage.setItem('emails', JSON.stringify(emails));
        document.getElementById('emailInput' + formNumber).value = '';
        document.getElementById('parameterSelect' + formNumber).value = '';
        renderEmails(emails);
      }
    }

    function renderEmails(listToShow) {
      const list = document.getElementById('emailList');
      list.innerHTML = '';
      listToShow.forEach((entry) => {
        const summary = entry.text.length > 50 ? entry.text.substring(0, 50) + "..." : entry.text;
        list.innerHTML += `
          <div class="email-box">
            <div class="summary" onclick="toggleEmail(${entry.id})">${summary}</div>
            <div class="date">Saved on: ${entry.date}</div>
            <div><strong>Parameter:</strong> ${entry.parameter}</div>
            <textarea id="email${entry.id}" style="display:none;" onchange="editEmail(${entry.id}, this.value)">${entry.text}</textarea>
            <button class="btn btn-danger" onclick="deleteEmail(${entry.id})">Delete</button>
          </div>
        `;
      });
      document.getElementById('auditCount').innerText = emails.length;
    }

    function toggleEmail(id) {
      const box = document.getElementById('email' + id);
      if (box) box.style.display = box.style.display === 'none' ? 'block' : 'none';
    }

    function editEmail(id, newText) {
      const entry = emails.find(e => e.id === id);
      if (entry) {
        entry.text = newText;
        localStorage.setItem('emails', JSON.stringify(emails));
        renderEmails(emails);
      }
    }

    function deleteEmail(id) {
      emails = emails.filter(e => e.id !== id);
      localStorage.setItem('emails', JSON.stringify(emails));
      renderEmails(emails);
    }

    renderEmails(emails);
  </script>
</body>
</html>
