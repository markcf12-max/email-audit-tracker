<!DOCTYPE html>
<html>
<head>
  <title>Email Audit Tracker with Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Login Section -->
  <div id="loginSection">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button class="btn" onclick="login()">Login</button>
  </div>

  <!-- Tracker Section (hidden until login) -->
  <div id="trackerSection" style="display:none;">
    <h1>Email Audit Tracker</h1>

    <!-- Logout button -->
    <button class="btn btn-danger" onclick="logout()">Logout</button>

    <!-- Floating audit counter -->
    <div id="auditCounter">Total Audits: <span id="auditCount">0</span></div>

    <!-- Audit entry form -->
    <textarea id="emailInput" placeholder="Paste or type your audited email here..."></textarea><br>

<!-- Parameter dropdowns -->
<label>Reliable:</label>
<select id="paramReliable" required>
  <option value="">Select Issue</option>
  <option>No Opportunity</option>
  <option>Irrelevant Solution</option>
  <option>Incomplete Solution</option>
  <option>Untimely Solution - ZTP</option>
  <option>Unclear Solution</option>
</select>

<label>Personable:</label>
<select id="paramPersonable" required>
  <option value="">Select Issue</option>
  <option>No Opportunity</option>
  <option>Poor Listening Skills</option>
  <option>Customer validation and Empathy Gap</option>
  <option>Did not adjust tone/pace</option>
  <option>Did not adjust to customer’s language</option>
  <option>Negative Words/Phrasing</option>
  <option>Unfriendly/discourteous/sarcastic</option>
  <option>Sounded transactional or robotic</option>
</select>

<label>Fast:</label>
<select id="paramFast" required>
  <option value="">Select Issue</option>
  <option>No Opportunity</option>
  <option>Untimely Response - Negative CX</option>
  <option>Untimely Response - within threshold</option>
  <option>Untimely Response - Knowledge Gap</option>
  <option>Untimely Response - Complex Issues</option>
  <option>Untimely Response - Tools Issue</option>
  <option>Untimely Response - Behavior Concerns</option>
</select>

<label>Safe and Secure:</label>
<select id="paramSafe" required>
  <option value="">Select Issue</option>
  <option>No Opportunity</option>
  <option>No Authentication</option>
  <option>Unnecessary authentication</option>
  <option>Incorrect/Untimely authentication</option>
  <option>Incomplete authentication</option>
  <option>Unable to perform account validation</option>
  <option>Divulging Customer Information</option>
  <option>Divulging internal company processes</option>
  <option>Did not deliver Outbound Call Monitoring Spiel</option>
  <option>Did not follow prescribed spiel</option>
  <option>Did not offer CSAT</option>
  <option>Did not document interaction</option>
  <option>Incorrect documentation</option>
  <option>Incomplete documentation</option>
  <option>No Tagging / Incorrect / Incomplete tagging</option>
  <option>Incorrect punctuation</option>
  <option>Incorrect spelling</option>
  <option>Incorrect capitalization</option>
  <option>Multiple grammar errors</option>
  <option>Did not follow prescribed language</option>
</select>

    <button class="btn" onclick="saveEmail()">Save Audit</button>

    <h2>Search Audits</h2>
    <input type="text" id="searchInput" placeholder="Enter keyword...">
    <button class="btn" onclick="searchEmails()">Search</button>
<button class="btn" onclick="exportCSV()">Export CSV</button>
<button class="btn" onclick="renderAllAudits()">Show All Audits</button>
<button id="backRecentBtn" class="btn" onclick="renderRecentAudits()" disabled>Back to Recent (3)</button>


    <h2>Saved Audits</h2>
    <div id="emailList"></div>

    <!-- Delete confirmation modal -->
    <div id="deleteModal" class="modal">
      <div class="modal-content">
        <p>Are you sure you want to delete this audit?</p>
        <div class="modal-buttons">
          <button class="btn btn-danger" onclick="confirmDelete()">Yes, Delete</button>
          <button class="btn" onclick="closeModal()">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- External JS -->
  <script src="script.js"></script>
</body>
</html>
