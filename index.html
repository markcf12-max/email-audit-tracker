<!DOCTYPE html>
<html>
<head>
  <title>Email Audit Tracker with Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Login Section -->
  <div id="loginSection">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button class="btn" onclick="login()">Login</button>
  </div>

  <!-- Tracker Section (hidden until login) -->
  <div id="trackerSection" style="display:none;">
    <h1>Email Audit Tracker</h1>

    <!-- Logout button -->
    <button class="btn btn-danger" onclick="logout()">Logout</button>

    <!-- Floating audit counter + burger -->
    <div id="auditHeader">
      <div id="auditCounter">Total Audits: <span id="auditCount">0</span></div>
      <div class="burger-menu" onclick="toggleMenu()">☰</div>
    </div>

    <!-- Sidebar menu -->
    <div id="sideMenu" class="side-menu">
      <a href="#" onclick="renderRecentAudits()">Recent Audits</a>
      <a href="#" onclick="renderAllAudits()">All Audits</a>
      <a href="#" onclick="exportCSV()">Export CSV</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>

    <!-- Audit entry form -->
    <textarea id="emailInput" placeholder="Paste or type your audited email here..."></textarea><br>

    <!-- Parameter dropdowns -->
    <!-- (your dropdowns remain unchanged here) -->

    <button class="btn" onclick="saveEmail()">Save Audit</button>

    <h2>Search Audits</h2>
    <form class="search-container" onsubmit="searchEmails(); return false;">
      <input type="text" id="searchInput" placeholder="Search audits...">
      <button type="submit" class="search-btn">🔍</button>
    </form>
    <button class="btn" onclick="exportCSV()">Export CSV</button>
    <button class="btn" onclick="renderAllAudits()">Show All Audits</button>
    <button id="backRecentBtn" class="btn" onclick="renderRecentAudits()" disabled>Back to Recent (3)</button>

    <h2>Saved Audits</h2>
    <div id="emailList"></div>

    <!-- Delete confirmation modal -->
    <div id="deleteModal" class="modal">
      <div class="modal-content">
        <p>Are you sure you want to delete this audit?</p>
        <div class="modal-buttons">
          <button class="btn btn-danger" onclick="confirmDelete()">Yes, Delete</button>
          <button class="btn" onclick="closeModal()">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <!-- External JS -->
  <script src="script.js"></script>
</body>
</html>
